<h1>{{ article.title }}</h1>

<p>{{ article.content }}</p>


<hr>

{% if user == article.author %}
<a href="{% url 'edit_article' article.pk %}">Edit</a>

<form method="POST" action="{% url 'delete_article' article.id %}">
  {% csrf_token %}
  <button type="submit">Delete</button>
</form>

{% endif %}

<a href="{% url 'index' %}">Back</a>
