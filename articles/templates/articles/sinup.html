<h1>Signup</h1>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
  {% csrf_token %}
  <input name="username" placeholder="Username"><br><br>
  <input name="password" type="password" placeholder="Password"><br><br>
  <button>Create Account</button>
</form>

<a href="/login/">Login</a>
